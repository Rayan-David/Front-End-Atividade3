<html lang="en">
<head>

</head>
<style>
    body{
        background-image: linear-gradient(rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.5)),
        url("fundo.png");
        background-size: cover; /* A imagem cobre toda a tela */
        background-repeat: no-repeat; /* Não repete a imagem */
        background-position: center; /* Centraliza a imagem */
        background-attachment: fixed; 
    }
    #title{
        color: black;
        font-size: 30px;
        text-align: center;
    }
   
    .foods{
        color: black;
        text-align: top;
    }
    img{
        width: 400px;
        height: 200px;
    }
    h2{
        font-size: 25px;
    
    }
</style>
<body>
    <div id="title">
        <h1>Receitas da Vovo</h1>
    </div>
    <div class="foods">
            <h2>Picanha</h2>
            <img src="picanha.jpg" alt="">

            <p>Modo de preparo</p>

</body>
</html>
